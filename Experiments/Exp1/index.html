
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>24070521144</title>

    <!-- Internal JavaScript -->
    <script>
        function showWelcome() {
            document.getElementById("message").innerHTML =
                "<h2>Welcome to JavaScript Programming!</h2>";
        }
    </script>

    <!-- External JavaScript -->
    <script src="script.js" defer></script>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f2f2f2;
            text-align:center;
            margin-top:40px;
        }

        .card{
            width:350px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        button{
            margin-top:15px;
            padding:10px 18px;
            cursor:pointer;
        }
    </style>
</head>
<body onload="showWelcome()">

<div class="card">

    <div id="message"></div>

    <h3>User Information</h3>

    <p><strong>Name:</strong> <span id="name"></span></p>
    <p><strong>Age:</strong> <span id="age"></span></p>
    <p><strong>City:</strong> <span id="city"></span></p>

    <!-- Inline JavaScript -->
    <button onclick="alert('Thank you for visiting!')">
        Click Me
    </button>

</div>

</body>
</html>
